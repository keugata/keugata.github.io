<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KeuGata.com</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-ultra-dark: #020202;
            --accent-gold: #ffd700;
            --glass-card: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.09);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-ultra-dark);
            background-image: radial-gradient(circle at 50% 50%, #161616 0%, #020202 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            overflow: hidden;
            color: #fff;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.04) 0%, rgba(0,0,0,0) 70%);
            z-index: 1; pointer-events: none;
        }

        /* --- PHONE FRAME CONTAINER --- */
        .phone-frame {
            position: relative;
            width: 100%;
            max-width: 100vw;
            height: 100dvh;
            max-height: 100vh;
            background: #000;
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            border: 6px solid #1f1f1f;
            display: flex;
            flex-direction: column;
            z-index: 10;
            touch-action: none;
        }

        @media (max-width: 450px) {
            .phone-frame { border-radius: 0; border: none; max-height: 100dvh; }
        }

        /* --- UI FADE OUT ON HOLD --- */
        .ui-element { transition: opacity 0.3s ease; }
        .hide-ui .ui-element { opacity: 0 !important; pointer-events: none; }

        /* --- PROGRESS BAR SYSTEM --- */
        .story-progress-container {
            position: absolute;
            top: 15px; left: 0; right: 0;
            display: flex;
            padding: 0 16px;
            gap: 6px;
            z-index: 40;
        }

        .track-hitbox {
            flex: 1;
            padding: 10px 0;
            cursor: pointer;
        }

        .track-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .fill-bar {
            height: 100%; width: 0%;
            background: #ffffff;
            border-radius: 4px;
        }

        /* --- PROFILE HEADER --- */
        .story-header {
            position: absolute;
            top: 32px; left: 0; right: 0;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 40;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
        }

        .user-block { display: flex; align-items: center; gap: 12px; }
        .avatar-frame { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-gold); }
        .user-meta .username { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .user-meta .timestamp { font-size: 11px; color: rgba(255, 255, 255, 0.8); text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        .header-controls { display: flex; align-items: center; gap: 16px; z-index: 50; }
        .control-btn { background: transparent; border: none; color: white; font-size: 16px; cursor: pointer; padding: 4px; }

        /* --- NAVIGATION INTERACTION ZONES --- */
        .zone { position: absolute; top: 100px; bottom: 120px; width: 40%; z-index: 20; }
        .zone-left { left: 0; }
        .zone-right { right: 0; }

        /* --- SLIDES VIEWPORT --- */
        .slides-viewport { width: 100%; height: 100%; position: relative; background: #000; }
        
        .slide-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden; transform: scale(0.97);
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1), transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
        }

        .slide-frame.active { opacity: 1; visibility: visible; transform: scale(1); }
        .media-asset { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        .media-caption {
            position: absolute; bottom: 115px; left: 5%; right: 5%;
            padding: 20px; text-align: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            font-size: 15px; font-weight: 600; line-height: 1.5; z-index: 15;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transform: translateY(10px); transition: transform 0.4s ease;
        }

        .slide-frame.active .media-caption { transform: translateY(0); }

        /* --- FOOTER INTERACTION HUB --- */
        .story-footer-hub {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px 24px 34px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 30%, transparent);
            z-index: 35; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .action-btn {
            background: transparent; border: none; color: #fff;
            font-size: 26px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; justify-content: center; align-items: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            padding: 12px;
        }

        .action-btn:hover { transform: scale(1.15); }
        .action-btn:active { transform: scale(0.9); }
        
        /* Toast Notification */
        .toast-notification {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .toast-notification.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="phone-frame" id="mainCoreWrapper">
        
        <!-- Progress Bars Tracking System -->
        <div class="story-progress-container ui-element" id="barsContainer"></div>

        <!-- Header Profil Area -->
        <div class="story-header ui-element">
            <div class="user-block">
                <img src="https://raw.githubusercontent.com/keugata/keugata/refs/heads/main/file_000000000.webp" alt="Avatar" class="avatar-frame">
                <div class="user-meta">
                    <div class="username">KeuGata.com <i class="fa-solid fa-circle-check" style="color: #3b82f6; font-size: 13px;"></i></div>
                    <div class="timestamp" id="liveTime">Baru saja</div>
                </div>
            </div>
            <div class="header-controls" id="headerControls">
                <button class="control-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </div>
        </div>
        
        <!-- Toast Notification -->
        <div class="toast-notification" id="toast">Link berhasil disalin!</div>

        <!-- Navigation Hitbox Areas -->
        <div class="zone zone-left" id="leftTap"></div>
        <div class="zone zone-right" id="rightTap"></div>

        <!-- Master Viewport Dynamic Render -->
        <div class="slides-viewport" id="viewport"></div>

        <!-- Bottom Footer Interaction Hub -->
        <div class="story-footer-hub ui-element" id="footerHub">
            <button class="action-btn" id="shareBtn"><i class="fa-regular fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const contentStories = [
            { 
                type: 'image', 
                url: 'https://raw.githubusercontent.com/keugata/keugata/refs/heads/main/file_000000001.webp', 
                caption: 'Dia tau susahku. Dia tau kekuranganku. Tapi satu hal yang gak pernah kurang: sayangku ke kamu.', 
                timeAgo: '1 jam yang lalu' 
            },
            { 
                type: 'image', 
                url: 'https://raw.githubusercontent.com/keugata/keugata/refs/heads/main/file_000000002.webp', 
                caption: 'Tapi dia tetap memilih untuk tidak pergi. Terima kasih banyak, tuan putriku... 👑', 
                timeAgo: '32 menit yang lalu' 
            },
            { 
                type: 'image', 
                url: 'https://raw.githubusercontent.com/keugata/keugata/refs/heads/main/file_000000003.webp', 
                caption: 'I Love you more sayang ❤️ Selamanya.', 
                timeAgo: 'Baru saja' 
            }
        ];

        const SLIDE_DURATION = 5000;
        let activeIdx = 0;
        let animationFrameId = null;
        let timeTracker = 0;
        let accumulatedTime = 0;
        let systemPaused = false;
        let holdTimer = null; 
        let isLongPressActive = false;
        let touchStartX = 0;
        let touchEndX = 0;

        const viewport = document.getElementById('viewport');
        const barsContainer = document.getElementById('barsContainer');
        const liveTime = document.getElementById('liveTime');
        const mainWrapper = document.getElementById('mainCoreWrapper');
        const toast = document.getElementById('toast');
        const shareBtn = document.getElementById('shareBtn');
        const footerHub = document.getElementById('footerHub');
        const headerControls = document.getElementById('headerControls');

        function preloadAssets() {
            contentStories.forEach(story => { if (story.type === 'image') new Image().src = story.url; });
        }

        function buildSystem() {
            viewport.innerHTML = '';
            barsContainer.innerHTML = '';

            contentStories.forEach((story, idx) => {
                const hitbox = document.createElement('div');
                hitbox.className = 'track-hitbox';
                hitbox.dataset.index = idx;
                
                const track = document.createElement('div');
                track.className = 'track-bar';
                
                const fill = document.createElement('div');
                fill.className = 'fill-bar';
                fill.id = `bar-fill-${idx}`;
                
                track.appendChild(fill);
                hitbox.appendChild(track);
                barsContainer.appendChild(hitbox);

                const frame = document.createElement('div');
                frame.className = `slide-frame ${idx === 0 ? 'active' : ''}`;

                if (story.type === 'image') {
                    frame.innerHTML = `<img src="${story.url}" class="media-asset" alt="Media Asset"><div class="media-caption ui-element">${story.caption}</div>`;
                }
                viewport.appendChild(frame);
            });
        }

        function playSlide(index) {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            if (index >= contentStories.length) index = 0;
            if (index < 0) index = 0;

            activeIdx = index;
            liveTime.innerText = contentStories[activeIdx].timeAgo;

            document.querySelectorAll('.slide-frame').forEach((f, i) => f.classList.toggle('active', i === activeIdx));

            contentStories.forEach((_, i) => {
                const fill = document.getElementById(`bar-fill-${i}`);
                if (fill) {
                    if (i < activeIdx) fill.style.width = '100%';
                    else if (i > activeIdx) fill.style.width = '0%';
                }
            });

            systemPaused = false;
            accumulatedTime = 0; 
            runProgressBar();
        }

        function runProgressBar() {
            const currentFill = document.getElementById(`bar-fill-${activeIdx}`);
            if (!currentFill) return;

            const startTime = Date.now() - accumulatedTime;
            timeTracker = startTime;

            function update() {
                if (!systemPaused) {
                    const timePassed = Date.now() - startTime;
                    const percent = Math.min((timePassed / SLIDE_DURATION) * 100, 100);
                    currentFill.style.width = `${percent}%`;

                    if (timePassed >= SLIDE_DURATION) {
                        shiftNext();
                    } else {
                        animationFrameId = requestAnimationFrame(update);
                    }
                }
            }
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(update);
        }

        function shiftNext() { playSlide(activeIdx + 1); }
        function shiftPrev() { if (activeIdx > 0) playSlide(activeIdx - 1); else playSlide(0); }

        function pauseTimeline() {
            if (systemPaused) return;
            systemPaused = true;
            accumulatedTime = Date.now() - timeTracker;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
        }

        function resumeTimeline() {
            if (systemPaused) {
                systemPaused = false;
                runProgressBar();
            }
        }

        const ignoreElements = (e) => {
            return e.target.closest('#footerHub') || e.target.closest('#headerControls') || e.target.closest('.track-hitbox');
        };

        barsContainer.addEventListener('click', (e) => {
            const hitbox = e.target.closest('.track-hitbox');
            if (hitbox) playSlide(parseInt(hitbox.dataset.index));
        });

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) pauseTimeline();
            else resumeTimeline();
        });

        mainWrapper.addEventListener('mousedown', (e) => {
            if (ignoreElements(e) || e.target.closest('.zone')) return;
            pauseTimeline();
            isLongPressActive = false;
            holdTimer = setTimeout(() => { 
                mainWrapper.classList.add('hide-ui'); 
                isLongPressActive = true;
            }, 200); 
        });

        mainWrapper.addEventListener('mouseup', (e) => {
            if (holdTimer) clearTimeout(holdTimer);
            mainWrapper.classList.remove('hide-ui');
            resumeTimeline();
        });

        mainWrapper.addEventListener('touchstart', (e) => {
            if (ignoreElements(e)) return;
            touchStartX = e.changedTouches[0].screenX;
            pauseTimeline();
            isLongPressActive = false;
            holdTimer = setTimeout(() => { 
                mainWrapper.classList.add('hide-ui'); 
                isLongPressActive = true;
            }, 200); 
        }, { passive: true });

        mainWrapper.addEventListener('touchend', (e) => {
            if (holdTimer) clearTimeout(holdTimer);
            mainWrapper.classList.remove('hide-ui');

            touchEndX = e.changedTouches[0].screenX;
            const swipeDistance = touchStartX - touchEndX;

            if (Math.abs(swipeDistance) > 50) {
                if (swipeDistance > 50) shiftNext();
                else shiftPrev();
            } else {
                resumeTimeline();
            }
        }, { passive: true });

        document.getElementById('rightTap').addEventListener('click', (e) => { 
            if(!ignoreElements(e) && !isLongPressActive) shiftNext(); 
        });
        
        document.getElementById('leftTap').addEventListener('click', (e) => { 
            if(!ignoreElements(e) && !isLongPressActive) shiftPrev(); 
        });
        
        function showToast() {
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        function executeShare(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            
            const cleanBaseUrl = window.location.href.split('?')[0];
            const dynamicShareLink = `${cleanBaseUrl}?${activeIdx + 1}`;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(dynamicShareLink).then(() => {
                    showToast();
                }).catch(() => {
                    fallbackCopy(dynamicShareLink);
                });
            } else {
                fallbackCopy(dynamicShareLink);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed'; 
            textArea.style.top = '0';
            textArea.style.left = '0';
            textArea.style.opacity = '0';
            document.body.appendChild(textArea);
            textArea.select();
            textArea.setSelectionRange(0, 99999);
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                alert('Salin link manual: ' + text);
            }
            document.body.removeChild(textArea);
        }

        shareBtn.addEventListener('click', executeShare);
        
        footerHub.addEventListener('click', (e) => e.stopPropagation());
        footerHub.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
        footerHub.addEventListener('touchend', (e) => e.stopPropagation(), { passive: true });
        headerControls.addEventListener('click', (e) => e.stopPropagation());
        headerControls.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });

        // --- RUN ENGINE SYSTEM ---
        preloadAssets();
        buildSystem();

        const queryParam = window.location.search.substring(1); 
        const slideParam = parseInt(queryParam);
        
        let startSlideIndex = 0;
        if (!isNaN(slideParam) && slideParam > 0 && slideParam <= contentStories.length) {
            startSlideIndex = slideParam - 1; 
        }

        playSlide(startSlideIndex);
    </script>
</body>
</html>
